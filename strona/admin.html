<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>repfinder | Admin Cloud</title>
  <style>
    :root { --bg: #0b0d0f; --card: #14171a; --input: #1c2024; --border: rgba(255,255,255,0.05); --text: #f8fafc; --muted: #94a3b8; --accent: #ffffff; --danger: #ff4d4d; --success: #22c55e; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 30px; }
    .container { max-width: 1300px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 24px; }
    .grid { display: grid; grid-template-columns: 400px 1fr; gap: 30px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 30px; }
    .item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 10px; background: rgba(255,255,255,0.01); }
    .item img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
    .inp { width: 100%; height: 50px; background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 0 16px; color: #fff; margin-bottom: 20px; box-sizing: border-box; outline: none; }
    .btn-save { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 15px; font-weight: 800; display: none; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <h1 style="font-weight: 900; letter-spacing: -1px;">repfinder <span style="color:var(--muted); font-weight:400">/ Cloud Admin</span></h1>
        <a href="index.html" style="color:#fff; text-decoration:none; font-size:13px; font-weight:700; background:var(--card); padding:10px 20px; border-radius:12px; border:1px solid var(--border)">← Back to site</a>
    </header>

    <div class="stats">
        <div class="stat-card">Products: <b id="statTotal" style="font-size: 24px;">0</b></div>
        <div class="stat-card">Platform: <b style="color:var(--success)">VERCEL CLOUD</b></div>
        <div class="stat-card">Cloud Base: <b style="color:var(--success)">CONNECTED</b></div>
    </div>

    <div class="grid">
        <div class="panel">
            <h2 style="font-size:18px; margin-bottom:20px;">Inventory</h2>
            <div id="list" style="max-height: 600px; overflow-y: auto;"></div>
        </div>

        <div class="panel">
            <h2 id="formTitle">Add / Edit Product</h2>
            <form id="prodForm">
                <input type="hidden" id="eId">
                <label style="font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase;">Product Name</label>
                <input type="text" id="fName" class="inp" required placeholder="e.g. Jordan 4 Retro">
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                    <div><label style="font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase;">Price (USD)</label><input type="text" id="fPrice" class="inp" required placeholder="20.00"></div>
                    <div><label style="font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase;">Category</label>
                        <select id="fCat" class="inp">
                            <option value="Shoes">Shoes</option>
                            <option value="Shorts">Shorts</option>
                            <option value="Pants">Pants</option>
                            <option value="T-shirts">T-shirts</option>
                            <option value="Hoodies">Hoodies</option>
                            <option value="Jackets">Jackets</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                </div>

                <label style="font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase;">Image URL</label>
                <input type="url" id="fImg" class="inp" required placeholder="https://...">
                
                <label style="font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase;">KakoBuy Link</label>
                <input type="url" id="fLink" class="inp" placeholder="https://...">

                <button type="submit" class="btn-save">Update Cloud Database</button>
            </form>
        </div>
    </div>
</div>

<script>
    const BIN_ID = '69c32a96aa77b81da91778f6';
    const API_KEY = '$2a$10$D/K16JUBGQOBjODs5N4xg.YKaDxJSCrHReksEeS32GBaHWglrtc9u'; 
    const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    let db = [];

    async function load() {
        try {
            const r = await fetch(URL + '/latest', { headers: { 'X-Master-Key': API_KEY } });
            const data = await r.json();
            db = Array.isArray(data.record) ? data.record : [];
            render();
        } catch(e) { notify('Błąd połączenia z chmurą!', '#ff4d4d'); }
    }

    function render() {
        document.getElementById('statTotal').innerText = db.length;
        document.getElementById('list').innerHTML = db.map(p => `
            <div class="item">
                <img src="${p.Link_Zdjecie}" onerror="this.src='https://placehold.co/50'">
                <div style="flex:1; min-width:0">
                    <div style="font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.Nazwa}</div>
                    <div style="font-size:10px; color:var(--muted)">$${p.Cena_USD}</div>
                </div>
                <button onclick="edit('${p.id}')" style="background:none; border:1px solid var(--border); color:#fff; padding:5px 10px; border-radius:8px; cursor:pointer; font-size:11px; font-weight:700">Edit</button>
                <button onclick="del('${p.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:11px; font-weight:700">Del</button>
            </div>
        `).join('');
    }

    document.getElementById('prodForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('eId').value || Date.now().toString();
        const product = {
            id,
            Nazwa: document.getElementById('fName').value,
            Cena_USD: document.getElementById('fPrice').value,
            Kategoria: document.getElementById('fCat').value,
            WyswietlanaKategoria: document.getElementById('fCat').value.toUpperCase(),
            Link_Zdjecie: document.getElementById('fImg').value,
            Link_Kakobuy: document.getElementById('fLink').value
        };

        const idx = db.findIndex(x => x.id === id);
        if(idx > -1) db[idx] = product; else db.unshift(product);

        notify('Wysyłanie do chmury...', '#444');
        const r = await fetch(URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(db)
        });

        if(r.ok) {
            notify('Zapisano pomyślnie!', '#22c55e');
            resetForm();
            render();
        } else { notify('Błąd zapisu!', '#ff4d4d'); }
    };

    function edit(id) {
        const p = db.find(x => x.id === id);
        document.getElementById('eId').value = p.id;
        document.getElementById('fName').value = p.Nazwa;
        document.getElementById('fPrice').value = p.Cena_USD;
        document.getElementById('fCat').value = p.Kategoria;
        document.getElementById('fImg').value = p.Link_Zdjecie;
        document.getElementById('fLink').value = p.Link_Kakobuy;
        document.getElementById('formTitle').innerText = "Edit Product";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function del(id) {
        if(!confirm('Usunąć produkt?')) return;
        db = db.filter(x => x.id !== id);
        const r = await fetch(URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(db)
        });
        if(r.ok) { notify('Usunięto!', '#22c55e'); render(); }
    }

    function resetForm() {
        document.getElementById('prodForm').reset();
        document.getElementById('eId').value = '';
        document.getElementById('formTitle').innerText = "Add Product";
    }

    function notify(m, c) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.background = c; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    load();
</script>
</body>
</html>
